services:
  migrate:
    image: ghcr.io/bobywan/tropchaud-migrator:latest
    restart: "no"
    environment:
      DATABASE_URL: postgresql://tropchaud:${POSTGRES_PASSWORD:-motdepasse}@postgres:5432/tropchaud
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tropchaud

  seeder:
    image: ghcr.io/bobywan/tropchaud-seeder:latest
    restart: "no"
    environment:
      DATABASE_URL: postgresql://tropchaud:${POSTGRES_PASSWORD:-motdepasse}@postgres:5432/tropchaud
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@tropchaud.fr}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - tropchaud

  app:
    image: ghcr.io/bobywan/tropchaud:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://tropchaud:${POSTGRES_PASSWORD:-motdepasse}@postgres:5432/tropchaud
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-tropchaud}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seeder:
        condition: service_completed_successfully
      createbuckets:
        condition: service_completed_successfully
    networks:
      - tropchaud

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tropchaud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-motdepasse}
      POSTGRES_DB: tropchaud
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tropchaud -d tropchaud"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tropchaud

  minio:
    # minio/minio n'est plus maintenu (archivé fév. 2026) — alpine/minio est l'alternative communautaire officielle
    image: alpine/minio:RELEASE.2025-10-15T17-29-55Z
    user: "0:0"
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9010:9000"
      - "9011:9001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tropchaud

  createbuckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      mc alias set s3 http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing s3/$${MINIO_BUCKET:-tropchaud};
      exit 0;
      "
    networks:
      - tropchaud

volumes:
  postgres_data:
  minio_data:

networks:
  tropchaud:
    driver: bridge
