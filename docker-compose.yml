services:
  migrate:
    build:
      context: .
      target: migrator
    restart: "no"
    environment:
      DATABASE_URL: postgresql://tropchaud:${POSTGRES_PASSWORD:-motdepasse}@postgres:5432/tropchaud
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tropchaud

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://tropchaud:${POSTGRES_PASSWORD:-motdepasse}@postgres:5432/tropchaud
      AUTH_SECRET: ${AUTH_SECRET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-tropchaud}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - tropchaud

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tropchaud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-motdepasse}
      POSTGRES_DB: tropchaud
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tropchaud -d tropchaud"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tropchaud

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9010:9000"
      - "9011:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tropchaud

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      mc alias set s3 http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing s3/tropchaud;
      exit 0;
      "
    networks:
      - tropchaud

volumes:
  postgres_data:
  minio_data:

networks:
  tropchaud:
    driver: bridge
